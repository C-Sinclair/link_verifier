name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3"

      - run: opam install . --deps-only --with-test --yes
      - run: opam exec -- dune build
      - run: opam exec -- dune runtest
