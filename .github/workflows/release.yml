name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.14.0"
          rebar3-version: "3"

      - run: gleam deps download
      - run: gleam test
      - run: gleam run -m gleescript

      - name: Verify binary
        run: ./link_verifier --version

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            ./link_verifier \
            --title "${{ github.ref_name }}" \
            --generate-notes
